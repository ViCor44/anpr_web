<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ANPR VIGI</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  {% if login_mode %}
  <div class="login-wrap">
    <form class="card login-card" method="post" action="/login">
      <h1>ANPR VIGI</h1>
      <p>Entrar na interface web</p>
      {% if error %}<div class="error">{{ error }}</div>{% endif %}
      <input type="password" name="password" placeholder="Password">
      <button type="submit">Entrar</button>
    </form>
  </div>
  {% else %}
  <header class="topbar">
    <div>
      <h1>ANPR VIGI</h1>
      <div class="muted" id="camera-ip">Câmara: --</div>
    </div>
    <div class="top-actions">
      <a class="secondary linkbtn" href="/plates">Gerir matrículas</a>
      <a class="secondary linkbtn" href="/logout">Sair</a>
    </div>
  </header>

  <main class="layout">
    <section class="left">
      <div class="card">
        <div class="card-header">
          <h2>Live</h2>
          <span class="badge" id="live-badge">online</span>
        </div>
        <img id="live-feed" src="/video_feed" alt="Live camera feed">
      </div>

      <div class="grid">
        <div class="card stat">
          <div class="muted">Ultima matrí­cula</div>
          <div class="big" id="latest-plate">--</div>
        </div>
        <div class="card stat">
          <div class="muted">Confiança</div>
          <div class="big" id="latest-confidence">--</div>
        </div>
        <div class="card stat">
          <div class="muted">Estado</div>
          <div class="big" id="latest-state">--</div>
        </div>
      </div>
    </section>

    <section class="right">
      <div class="card">
        <div class="card-header">
          <h2>Controlo</h2>
        </div>
        <button id="open-gate-btn" class="danger">Abrir portão</button>
        <div class="muted top-space" id="manual-result">Nenhuma acção manual ainda.</div>
      </div>      
      <div class="card">
        <div class="card-header">
          <h2>Ultimos eventos</h2>
	  <a class="linkbtn secondary" href="/history">Ver todos</a>
        </div>
        <div id="events"></div>
      </div>
    </section>
  </main>
  <script src="/static/app.js"></script>
  {% endif %}
</body>
</html>
